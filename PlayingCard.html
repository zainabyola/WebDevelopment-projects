<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <style>
    #playing-cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}
.card{
  display:flex;
  justify-content:space-between;
  width:80px;
  height:100px;
  border:2px solid;
}
.left{
  align-self:flex-start;
}
.middle{
  align-self:center;
  display:flex;
  flex-direction:column;
}
.right{
  align-self:flex-end;
}
  </style>

</head>

<body>
<main id="playing-cards">
  <div class="card">
    <div class="left">♦</div>
    <div class="middle">♦</div>
    <div class="right">♦</div>
  </div>
  <div class="card">
    <div class="left">♣</div>
    <div class="middle">♣</div>
    <div class="right">♣</div>
  </div>
  <div class="card">
    <div class="left">♥</div>
    <div class="middle">♥</div>
    <div class="right">♥</div>
  </div>
</main>
</body>

</html>
