<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Book Inventory</title>
  <style>
    table{
  height:400px;
  width:500px;
  color:purple;
}
tr[class="read"]{
  background:linear-gradient(45deg, rgb(200,255,255),purple);
  
}
tr[class="to-read"]{
  background:linear-gradient(45deg, rgb(200,255,255),purple);
  
}
tr[class="in-progress"]{
  background:linear-gradient(45deg, rgb(200,255,255),purple);
}
span{
  display:inline-block;
}
tr[class="to-read"] span[class="status"]{
  border:1px solid pink;
  border-radius: 25px;
  background-image:linear-gradient(10deg, red,orange);

}
tr[class="read"] span[class="status"]{
  border:1px solid #c0ffd0;
  border-radius: 25px;
  background-image:linear-gradient(20deg, #00ff00,white);

}
tr[class="in-progress"] span[class="status"]{
  border:1px solid #c0ffd0;
  border-radius: 25px;
  background-image:linear-gradient(20deg, #f6ee23,white);

}
span[class="status"],span[class^=rate]{
  height:20px;
  width:90px;
  padding:10px;
}
span[class^="rate"]>span{
  border:1px solid pink;
  height:10px;
  width:10px;
  border-radius:50%;
  margin:5px;
  background-color:pink;

}
span[class~="one"] > span:nth-child(1) {
  background-image:linear-gradient(45deg, yellow,brown);

}
span[class~=two] > span:nth-child(1),span[class~=two] >span:nth-child(2){
  background-image:linear-gradient(45deg, yellow,brown);
}
span[class~=three] > span{
  background-image:linear-gradient(45deg, yellow,brown);
}
  </style>

<body>
  <h1>Book Inventory</h1>
  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Category</th>
        <th>Status</th>
        <th>Rate</th>
      </tr>
    </thead>
    <tbody>
      <tr class="read">
        <td>Book 1</td>
        <td>Author name</td>
        <td>Description</td> 
        <td><span class="status">Read</span></td>
        <td><span class="rate one"><span></span><span></span><span></span></span></td>
      </tr>
      <tr class="to-read">
        <td>Book 2</td>
        <td>Author name</td>
        <td>Description</td>
        <td><span class="status">To Read</span></td>
        <td><span class="rate two"><span></span><span></span><span></span></span</td>
      </tr>
      <tr class="in-progress">
        <td>Book 3</td>
        <td>Author name</td>
        <td>Description</td>
        <td><span class="status">In Progress</span></td>
        <td><span class="rate three"><span></span><span></span><span></span></span></td>
      </tr>
      <tr class="to-read">
        <td>Book 4</td>
        <td>Author name</td>
        <td>Description</td>
        <td><span class="status">To Read</span></td>
        <td><span class="rate four"><span></span><span></span><span></span></span></td>
      </tr>
    </tbody>

  </table>

</body>

</html>
