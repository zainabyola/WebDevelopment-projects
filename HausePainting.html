<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Painting</title>
    <style>
        #house {
            position: relative;
            width: 500px;
            height: 400px;
            background-color: #f2d6fa;
            border: 3px solid #fffe24;
        }

        #chimney {
            position: absolute;
            width: 90px;
            height: 100px;
            top: -100px;
            left: 65%;
            background: grey;
            border: 2px solid black;
            z-index: -1;
        }

        #roof {
            position: absolute;
            width: 500px;
            height: 100px;
            border: 3px solid #f8f99f;
            background-color: pink;
            top: 0;
        }

        #window-1 {
            position: absolute;
            width: 90px;
            height: 100px;
            border: 5px solid #f39356;
            top: 120px;
            left: 55px;
            background-color: #f3c356;
        }

        #window-2 {
            position: absolute;
            width: 90px;
            height: 100px;
            border: 5px solid #f39356;
            background-color: #f3c356;
            left: 370px;
            top: 120px;
        }

        #door {
            position: absolute;
            width: 130px;
            height: 200px;
            border: 5px solid #f39356;
            background-color: #f3c356;
            left: 194px;
            bottom: 0%;
        }
    </style>
</head>

<body>
    <div id="house">
        <div id="roof"></div>
        <div id="chimney"></div>
        <div id="window-1"></div>
        <div id="window-2"></div>
        <div id="door"></div>
    </div>

</body>

</html>
