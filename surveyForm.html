<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>
  <body>
    <h1 id="title">Survey Form</h1>
    <p id="description">Thank you for taking the time to help us improve the platform</p>
    <form id="survey-form">
    <label for="full-name" id="name-label">Name (required):</label>
          <input type="text" id="name" name="name" placeholder="e.g., John Doe" required size="20">

          <label for="email" id="email-label">Email address:</label>
          <input
            placeholder="example@email.com"
            required
            id="email"
            type="email"
            name="email"
            size="20"
          />
          <label for="age" id="number-label">Age(optional):</label>
          <input placeholder="age" type="number" id="number" name="age" min="1" max="100"/>
          <p>Which option best describes your current role?</p>
          <select name="select current roll" id="dropdown">
            <option value="select current roll">select current roll</option>
            <option value="student">Student</option>
            <option value="graduate">Graduate</option>
          </select>
          <p>Would you recommend freeCodeCamp to a friend?</p>
          <input id="yes" type="radio" name="recommended" value="yes" />
          <label for="yes-option">Yes</label>
          <input id="no-option" type="radio" name="recommended" value="no" />
          <label for="no-option">No</label>
          <p>What would you like to see improved? (Check all that apply)</p>
          <input type="checkbox" id="front-end" name="choice" value="front-end">
          <label for="front-end">Front-end</label>
          <input type="checkbox" id="back-end" name="choice" value="back-end">
          <label for="back-end">Back-end</label>
          <input type="checkbox" id="data" name="choice" value="data">
          <label for="data">Data Visualization</label>
          <input type="checkbox" id="challenge" name="choice" value="challenge">
          <label for="challenge">Challenges</label>
          <input type="checkbox" id="open" name="choice" value="open">
          <label for="open">Open Source Community</label>
          <p>Any comments or suggestions?</p>
          <textarea rows="10" cols="30" name="comment" id="comment" pllaceholder="enter comment..."></textarea>
          <button id="submit" type="submit">submit</button>
    </form>
  </body>
</html>
