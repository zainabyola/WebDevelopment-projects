<!DOCTYPE html>
<html lang="en">

<head>
    <style>
a{
  text-decoration:none;
}
a:link{
  color:rgb(188, 216, 29);
}

a:hover{
  color:red;
}
a:focus{
  outline: green
}
a:active{
  color:purple;
}</style>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
</head>

<body>
<ul class="todo-list">
    <li>
        <input type="checkbox" id="explore">
        <label for="explore">Explore gaming keyboards</label>
        <ul class="sub-item">
            <li><a class="sub-item-link" href="https://freecodecamp.org/" target="_blank">Store link</a></li>
        </ul>
    </li>
    <li><input type="checkbox" id="finish">
        <label for="finish">Finish the report</label>
        <ul class="sub-item">
            <li><a class="sub-item-link" href="https://freecodecamp.org/" target="_blank">Request Access</a></li>
        </ul></li>
    <li><input type="checkbox" id="view">
        <label for="view">View Phone Waranty</label>
        <ul class="sub-item">
            <li><a class="sub-item-link" href="https://freecodecamp.org/" target="_blank">View Receipt</a></li>
        </ul></li>
        <li><input type="checkbox" id="receipt">
        <label for="receipt">Check processor spec</label>
        <ul class="sub-item">
            <li><a class="sub-item-link" href="https://freecodecamp.org/" target="_blank">View Model Number</a></li>
        </ul></li>
</ul>
</body>

</html>
