<!DOCTYPE html>
<html lang="en">
<head>
    <style>body{
  background-color:darkgreen;
}
.blog-post-card{
  background-color:white;
  border-radius:10px;
  width:345px;
  text-align:center;
}
.post-img{
  width:345px;
  border-bottom: 10px solid white;
}
.post-content{
  padding:20px;
}
.post-title{
  color:green;
  margin:20px
}
.post-excerpt{
  color:purple;
  margin:2px
}
.read-more{
  color:brown;
  background-color:pink;
  margin:20px;
  padding:7px;
  border-radius:6px;
  display:inline-block;
  text-decoration:none;
}
.read-more:hover{
  background-color:purple;
  color:white;
}</style>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card</title>
</head>
<body>
    <div class="blog-post-card">
        <img class="post-img" src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg" alt="typing keybord">
        <div class="post-content">
            <h2 class="post-title"> Web Development</h2>
            <p class="post-excerpt"> refers to the process of creating, building, and maintaining websites and web applications that run on the internet.</p>
            <a href="https://freecode" class="read-more" >Read More</a>
        </div>
    </div>
</body>
</html>
